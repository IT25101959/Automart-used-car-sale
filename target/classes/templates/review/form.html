<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Write Review')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:600px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>⭐ Write a Review</h1></div>

    <div class="card p-4">
        <div class="text-center mb-4">
            <div style="font-size:3rem">👤</div>
            <h5 style="color:var(--text-primary)" th:text="${seller.fullName}">Seller</h5>
            <small style="color:var(--text-muted)" th:text="'@' + ${seller.username}">@username</small>
        </div>

        <form th:action="@{/reviews/add}" method="post">
            <input type="hidden" name="sellerId" th:value="${seller.id}" />
            <div class="mb-4 text-center">
                <label class="form-label">Your Rating</label>
                <div class="star-input justify-content-center">
                    <input type="hidden" name="rating" value="5" />
                    <label data-value="1" class="active">★</label>
                    <label data-value="2" class="active">★</label>
                    <label data-value="3" class="active">★</label>
                    <label data-value="4" class="active">★</label>
                    <label data-value="5" class="active">★</label>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Your Review</label>
                <textarea name="comment" class="form-control" rows="4" placeholder="Share your experience..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit Review</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
