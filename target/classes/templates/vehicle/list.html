<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Browse Cars')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1>Browse Cars</h1>
            <p style="color:var(--text-muted)" th:text="'Showing ' + ${vehicles.size()} + ' vehicles'">Vehicles</p>
        </div>
        <form th:action="@{/vehicles}" method="get" class="d-flex gap-2">
            <input type="text" name="q" class="form-control" placeholder="Search make or model..." th:value="${searchQuery}" style="min-width:250px" />
            <button type="submit" class="btn btn-primary">🔍</button>
        </form>
    </div>

    <!-- Filter by Make -->
    <div class="mb-4 d-flex gap-2 flex-wrap">
        <a th:href="@{/vehicles}" class="btn btn-sm" th:classappend="${filterMake == null} ? 'btn-primary' : 'btn-outline-primary'">All</a>
        <a th:each="m : ${makes}" th:href="@{/vehicles(make=${m})}" class="btn btn-sm"
           th:classappend="${filterMake == m} ? 'btn-primary' : 'btn-outline-primary'" th:text="${m}">Make</a>
    </div>

    <!-- Vehicle Grid -->
    <div class="row g-4">
        <div th:each="v,iter : ${vehicles}" class="col-md-6 col-lg-4 fade-in-up" th:classappend="'delay-' + ${(iter.index % 4) + 1}">
            <div class="vehicle-card card h-100">
                <div class="card-img-wrapper position-relative">
                    <img th:src="${v.imageUrl}" th:alt="${v.title}" class="card-img-top"
                         onerror="this.src='https://via.placeholder.com/400x220/1a1a3e/6c5ce7?text=No+Image'" />
                    <span class="price-tag" th:text="${v.formattedPrice}">$25,000</span>
                    <span class="fuel-badge" th:classappend="${v.fuelType == 'Electric'} ? 'electric' : 'petrol'" th:text="${v.fuelType}">Petrol</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${v.title}">2021 Toyota Camry</h5>
                    <div class="vehicle-info">
                        <span>📅 <span th:text="${v.year}">2021</span></span>
                        <span>📏 <span th:text="${#numbers.formatInteger(v.mileage, 1, 'COMMA')}">35,000</span> km</span>
                        <span>⚙️ <span th:text="${v.transmission}">Automatic</span></span>
                        <span>🎨 <span th:text="${v.color}">White</span></span>
                    </div>
                    <p class="mb-3" style="font-size:0.85rem;color:var(--text-secondary)" th:text="${#strings.abbreviate(v.description, 80)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <small style="color:var(--text-muted)">by <span th:text="${v.sellerUsername}">seller</span></small>
                        <a th:href="@{/vehicles/{id}(id=${v.id})}" class="btn btn-primary btn-sm">View Details</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${vehicles.isEmpty()}" class="text-center py-5">
        <div style="font-size:3rem;margin-bottom:1rem">🚗</div>
        <h4 style="color:var(--text-secondary)">No vehicles found</h4>
        <p style="color:var(--text-muted)">Try adjusting your search or filters</p>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
