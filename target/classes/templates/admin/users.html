<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
        <h1>👥 User Management</h1>
        <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
            <input type="text" name="q" class="form-control" placeholder="Search users..." th:value="${searchQuery}" style="min-width:250px" />
            <button type="submit" class="btn btn-primary">🔍</button>
        </form>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th>ID</th><th>Username</th><th>Full Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}">1</td>
                    <td style="font-weight:600" th:text="${u.username}">user</td>
                    <td th:text="${u.fullName}">Name</td>
                    <td th:text="${u.email}">email@test.com</td>
                    <td><span class="badge bg-primary" th:text="${u.displayRole}">Role</span></td>
                    <td>
                        <span class="badge" th:classappend="${u.active ? 'bg-approved' : 'bg-rejected'}" th:text="${u.active ? 'Active' : 'Inactive'}">Status</span>
                    </td>
                    <td th:text="${#temporals.format(u.createdAt, 'MMM dd, yyyy')}">Date</td>
                    <td>
                        <form th:if="${u.active}" th:action="@{/admin/users/{id}/deactivate(id=${u.id})}" method="post" style="display:inline">
                            <button class="btn btn-warning btn-sm">Deactivate</button>
                        </form>
                        <form th:if="${!u.active}" th:action="@{/admin/users/{id}/activate(id=${u.id})}" method="post" style="display:inline">
                            <button class="btn btn-success btn-sm">Activate</button>
                        </form>
                        <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline">
                            <button class="btn btn-danger btn-sm" data-confirm="Permanently delete this user?">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
