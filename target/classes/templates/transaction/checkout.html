<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Checkout')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:700px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>Checkout</h1></div>

    <div class="card p-4 mb-4">
        <div class="d-flex gap-3 align-items-center mb-3">
            <img th:src="${vehicle.imageUrl}" style="width:120px;height:80px;object-fit:cover;border-radius:8px"
                 onerror="this.src='https://via.placeholder.com/120x80/1a1a3e/6c5ce7?text=Car'" />
            <div>
                <h5 style="color:var(--text-primary)" th:text="${vehicle.title}">Vehicle</h5>
                <p style="color:var(--text-muted);margin:0" th:text="${vehicle.fuelType} + ' • ' + ${vehicle.transmission} + ' • ' + ${#numbers.formatInteger(vehicle.mileage, 1, 'COMMA')} + ' km'">Details</p>
            </div>
        </div>
        <div class="divider"></div>
        <div class="d-flex justify-content-between mb-1">
            <span style="color:var(--text-secondary)">Vehicle Price</span>
            <span style="color:var(--text-primary);font-weight:600" th:text="${vehicle.formattedPrice}">$25,000</span>
        </div>
        <div class="d-flex justify-content-between mb-1">
            <span style="color:var(--text-secondary)">Service Fee</span>
            <span style="color:var(--text-primary)">$0.00</span>
        </div>
        <div class="divider"></div>
        <div class="d-flex justify-content-between">
            <span style="font-weight:700;font-size:1.1rem">Total</span>
            <span class="text-gradient" style="font-weight:800;font-size:1.3rem" th:text="${vehicle.formattedPrice}">$25,000</span>
        </div>
    </div>

    <div class="card p-4">
        <h5 class="mb-3" style="color:var(--text-primary)">Payment Method</h5>
        <form th:action="@{/transactions/checkout}" method="post">
            <input type="hidden" name="vehicleId" th:value="${vehicle.id}" />
            <div class="mb-4">
                <div class="form-check mb-3 p-3" style="background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--glass-border)">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="CASH" id="cash" checked />
                    <label class="form-check-label" for="cash" style="color:var(--text-primary);cursor:pointer">
                        <strong>💵 Cash Payment</strong><br/><small style="color:var(--text-muted)">Pay in cash upon vehicle pickup</small>
                    </label>
                </div>
                <div class="form-check mb-3 p-3" style="background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--glass-border)">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="BANK_TRANSFER" id="bank" />
                    <label class="form-check-label" for="bank" style="color:var(--text-primary);cursor:pointer">
                        <strong>🏦 Bank Transfer</strong><br/><small style="color:var(--text-muted)">Transfer funds to seller's bank account</small>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100" data-confirm="Confirm this purchase?">
                ✅ Complete Purchase
            </button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
