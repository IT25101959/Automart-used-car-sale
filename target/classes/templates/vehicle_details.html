<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${vehicle.brand} + ' ' + ${vehicle.model})}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow">

    <!-- Flash messages -->
    <div th:if="${success}" class="mb-6 bg-green-50 border border-green-300 text-green-800 px-4 py-3 rounded-xl" th:text="${success}"></div>

    <!-- Vehicle Card -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="grid grid-cols-1 lg:grid-cols-2">
            <!-- Image Section -->
            <div class="h-80 lg:h-auto relative bg-gray-100">
                <img th:if="${vehicle.imageUrl != null and !vehicle.imageUrl.isEmpty()}"
                     th:src="${vehicle.imageUrl}" class="w-full h-full object-cover">
                <img th:unless="${vehicle.imageUrl != null and !vehicle.imageUrl.isEmpty()}"
                     src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                     class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                <div class="absolute bottom-4 left-4">
                    <span class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full" th:text="${vehicle.category}"></span>
                </div>
            </div>

            <!-- Details Section -->
            <div class="p-8 lg:p-10 flex flex-col">
                <div class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-1" th:text="${vehicle.brand}"></div>
                <h1 class="text-3xl font-extrabold text-slate-900 mb-1" th:text="${vehicle.model} + ' (' + ${vehicle.year} + ')'"></h1>
                <div class="text-3xl font-black text-blue-600 mb-6">
                    LKR <span th:text="${#numbers.formatDecimal(vehicle.price, 0, 'COMMA', 0, 'POINT')}"></span>
                </div>

                <!-- Specs Grid -->
                <div class="grid grid-cols-2 gap-y-4 gap-x-6 border-t border-b border-gray-100 py-6 mb-6 text-sm">
                    <div><span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">Mileage</span>
                         <span class="font-semibold text-slate-800" th:text="${vehicle.mileage} + ' km'"></span></div>
                    <div><span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">Fuel Type</span>
                         <span class="font-semibold text-slate-800" th:text="${vehicle.fuelType}"></span></div>
                    <div><span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">Transmission</span>
                         <span class="font-semibold text-slate-800" th:text="${vehicle.transmission}"></span></div>
                    <div><span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">Category</span>
                         <span class="font-semibold text-slate-800" th:text="${vehicle.category}"></span></div>
                    <div th:if="${vehicle.category == 'Car'}">
                        <span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">Doors</span>
                        <span class="font-semibold text-slate-800" th:text="${vehicle.numberOfDoors}"></span>
                    </div>
                    <div th:if="${vehicle.category == 'SUV'}">
                        <span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">4WD</span>
                        <span class="font-semibold text-slate-800" th:text="${vehicle.isFourWheelDrive ? 'Yes' : 'No'}"></span>
                    </div>
                    <div th:if="${vehicle.category == 'Truck'}">
                        <span class="text-gray-400 block text-xs uppercase font-semibold mb-0.5">Payload</span>
                        <span class="font-semibold text-slate-800" th:text="${vehicle.payloadCapacity} + ' kg'"></span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3 mt-auto">
                    <a th:href="@{/bookings/new(vehicleId=${vehicle.id})}"
                       class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
                        📅 Book Test Drive
                    </a>
                    <a th:href="@{/reviews/new(vehicleId=${vehicle.id})}"
                       class="flex-1 text-center bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg transition">
                        ⭐ Write Review
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Reviews Section -->
    <div class="mt-12">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-extrabold text-slate-900">Customer Reviews</h2>
            <a th:href="@{/reviews/new(vehicleId=${vehicle.id})}" class="text-sm text-blue-600 hover:underline font-semibold">+ Add Review</a>
        </div>

        <div th:if="${#lists.isEmpty(reviews)}" class="bg-white rounded-2xl border border-dashed border-gray-200 p-10 text-center">
            <p class="text-gray-400 text-lg">No reviews yet. Be the first to review this vehicle!</p>
            <a th:href="@{/reviews/new(vehicleId=${vehicle.id})}" class="mt-3 inline-block text-blue-600 font-semibold hover:underline">Write a Review →</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div th:each="review : ${reviews}" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-full flex items-center justify-center text-white font-bold"
                             th:text="${#strings.substring(review.user.name, 0, 1).toUpperCase()}"></div>
                        <div>
                            <p class="font-semibold text-slate-800 text-sm" th:text="${review.user.name}"></p>
                            <p class="text-xs text-gray-400" th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              class="text-lg"
                              th:text="${i <= review.rating ? '★' : '☆'}"
                              th:classappend="${i <= review.rating ? 'text-yellow-400' : 'text-gray-300'}"></span>
                    </div>
                </div>

                <span th:if="${review.reviewType == 'Verified Buyer'}"
                      class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 mb-2 inline-block">✓ Verified Buyer</span>

                <p class="text-gray-600 text-sm leading-relaxed" th:text="${review.content}"></p>

                <!-- Edit/Delete (own or admin) -->
                <div th:if="${session.loggedInUser != null}" class="mt-3 flex gap-3 text-xs">
                    <a th:if="${session.loggedInUser.id == review.user.id or session.loggedInUser.role == 'ADMIN'}"
                       th:href="@{/reviews/{id}/edit(id=${review.id})}"
                       class="text-blue-500 hover:underline">Edit</a>
                    <a th:if="${session.loggedInUser.id == review.user.id or session.loggedInUser.role == 'ADMIN'}"
                       th:href="@{/reviews/{id}/delete(id=${review.id})}"
                       class="text-red-500 hover:underline"
                       onclick="return confirm('Delete this review?')">Delete</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
