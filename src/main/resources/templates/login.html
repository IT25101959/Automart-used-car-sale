<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
    <div class="absolute inset-0 bg-slate-900 opacity-70"></div>
    <div class="max-w-md w-full space-y-8 glass p-10 rounded-2xl shadow-2xl relative z-10">
        <div>
            <h2 class="mt-6 text-center text-4xl font-extrabold text-white">AutoMart</h2>
            <p class="mt-2 text-center text-sm text-gray-300">Sign in to your account</p>
        </div>
        
        <div th:if="${error}" class="bg-red-500/20 border border-red-500 text-red-100 px-4 py-3 rounded relative" role="alert">
            <span class="block sm:inline" th:text="${error}"></span>
        </div>
        <div th:if="${param.registered}" class="bg-green-500/20 border border-green-500 text-green-100 px-4 py-3 rounded relative" role="alert">
            <span class="block sm:inline">Registration successful! Please login.</span>
        </div>

        <form class="mt-8 space-y-6" action="/login" method="POST">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email" class="sr-only">Email address</label>
                    <input id="email" name="email" type="email" required class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Email address">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Password">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300 shadow-lg">
                    Sign in
                </button>
            </div>
            <div class="text-center mt-4">
                <a href="/register" class="font-medium text-blue-400 hover:text-blue-300">Don't have an account? Register here</a>
            </div>
            <div class="text-center mt-2">
                <a href="/" class="font-medium text-gray-400 hover:text-white">← Back to Home</a>
            </div>
        </form>
    </div>
</body>
</html>
