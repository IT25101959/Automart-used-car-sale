<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Contact Us')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
        <div class="bg-blue-600 text-white p-10 md:w-1/3 flex flex-col justify-center">
            <h2 class="text-3xl font-bold mb-6">Get in Touch</h2>
            <p class="mb-8 text-blue-100">Have questions about our vehicles? We're here to help.</p>
            <div class="space-y-4">
                <p class="flex items-center"><span class="mr-3 text-xl">📍</span> 123 Car Street, Colombo</p>
                <p class="flex items-center"><span class="mr-3 text-xl">📞</span> +94 11 234 5678</p>
                <p class="flex items-center"><span class="mr-3 text-xl">✉️</span> support@automart.com</p>
            </div>
        </div>
        <div class="p-10 md:w-2/3">
            <div th:if="${success}" class="mb-5 bg-green-50 border border-green-300 text-green-800 px-4 py-3 rounded-xl flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                <span th:text="${success}"></span>
            </div>
            <form action="/contact" method="POST" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                        <input type="text" name="name" required
                               th:value="${session.loggedInUser != null ? session.loggedInUser.name : ''}"
                               placeholder="Your name"
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                        <input type="email" name="email" required
                               th:value="${session.loggedInUser != null ? session.loggedInUser.email : ''}"
                               placeholder="your@email.com"
                               class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label>
                    <input type="text" name="subject" required placeholder="e.g. Enquiry about a vehicle"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
                    <textarea name="message" rows="5" required placeholder="Write your message here..."
                              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm resize-none"></textarea>
                </div>
                <button type="submit" class="bg-slate-900 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition shadow text-sm">
                    Send Message →
                </button>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
