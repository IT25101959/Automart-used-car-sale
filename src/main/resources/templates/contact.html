<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Contact Us')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
        <div class="bg-blue-600 text-white p-10 md:w-1/3 flex flex-col justify-center">
            <h2 class="text-3xl font-bold mb-6">Get in Touch</h2>
            <p class="mb-8 text-blue-100">Have questions about our vehicles? We're here to help.</p>
            <div class="space-y-4">
                <p class="flex items-center"><span class="mr-3 text-xl">📍</span> 123 Car Street, Colombo</p>
                <p class="flex items-center"><span class="mr-3 text-xl">📞</span> +94 11 234 5678</p>
                <p class="flex items-center"><span class="mr-3 text-xl">✉️</span> support@automart.com</p>
            </div>
        </div>
        <div class="p-10 md:w-2/3">
            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                    <textarea rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
                <button type="button" class="bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-lg transition shadow">Send Message</button>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
