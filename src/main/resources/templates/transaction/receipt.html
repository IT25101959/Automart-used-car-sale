<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Receipt')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:650px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header text-center"><h1>🧾 Transaction Receipt</h1></div>

    <div class="receipt-card fade-in-up">
        <div class="receipt-header">
            <h3 class="text-gradient">AutoVault</h3>
            <p style="color:var(--text-muted);margin:0">Second-Hand Car Sales System</p>
        </div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Reference</span><span style="font-family:monospace" th:text="${transaction.referenceNumber}">TXN-123</span></div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Vehicle</span><span th:text="${transaction.vehicleTitle}">Car</span></div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Buyer</span><span th:text="${transaction.buyerUsername}">Buyer</span></div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Seller</span><span th:text="${transaction.sellerUsername}">Seller</span></div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Payment</span><span th:text="${transaction.paymentMethod == 'BANK_TRANSFER' ? 'Bank Transfer' : 'Cash'}">Cash</span></div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Status</span>
            <span class="badge" th:classappend="${transaction.status == 'COMPLETED' ? 'bg-approved' : 'bg-pending'}" th:text="${transaction.status}">Status</span>
        </div>
        <div class="receipt-row"><span style="color:var(--text-muted)">Date</span><span th:text="${#temporals.format(transaction.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span></div>
        <div class="receipt-total" th:text="${transaction.formattedAmount}">$25,000.00</div>

        <div class="text-center mt-4">
            <a th:href="@{/transactions/history}" class="btn btn-outline-primary">← Back to History</a>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
