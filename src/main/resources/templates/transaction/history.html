<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Transaction History')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>Transaction History</h1></div>

    <div th:if="${transactions.isEmpty()}" class="text-center py-5">
        <div style="font-size:3rem">📜</div>
        <h4 style="color:var(--text-secondary)">No transactions yet</h4>
    </div>

    <div class="table-responsive" th:if="${!transactions.isEmpty()}">
        <table class="table table-hover">
            <thead><tr><th>Ref#</th><th>Vehicle</th><th>Amount</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="tx : ${transactions}">
                    <td style="font-family:monospace;font-size:0.8rem" th:text="${tx.referenceNumber}">TXN-123</td>
                    <td th:text="${tx.vehicleTitle}">Vehicle</td>
                    <td style="font-weight:600" th:text="${tx.formattedAmount}">$25,000</td>
                    <td th:text="${tx.paymentMethod == 'BANK_TRANSFER' ? 'Bank Transfer' : 'Cash'}">Cash</td>
                    <td>
                        <span class="badge" th:classappend="${tx.status == 'COMPLETED' ? 'bg-approved' : tx.status == 'CANCELLED' ? 'bg-rejected' : 'bg-pending'}" th:text="${tx.status}">Status</span>
                    </td>
                    <td th:text="${#temporals.format(tx.createdAt, 'MMM dd, yyyy')}">Date</td>
                    <td>
                        <a th:href="@{/transactions/{id}/receipt(id=${tx.id})}" class="btn btn-outline-primary btn-sm">Receipt</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
