<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Inbox')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:800px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header d-flex justify-content-between align-items-center">
        <h1>✉️ Messages</h1>
        <a th:href="@{/messages/compose}" class="btn btn-primary">✏️ New Message</a>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-pills mb-4" role="tablist">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#inbox" style="color:var(--text-secondary)">Inbox</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#sent" style="color:var(--text-secondary)">Sent</a></li>
    </ul>

    <div class="tab-content">
        <!-- Inbox Tab -->
        <div class="tab-pane fade show active" id="inbox">
            <div th:if="${messages.isEmpty()}" class="text-center py-4">
                <p style="color:var(--text-muted)">No messages in your inbox</p>
            </div>
            <div th:each="msg : ${messages}">
                <a th:href="@{/messages/{id}(id=${msg.id})}" class="message-item" th:classappend="${!msg.read ? 'unread' : ''}">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="msg-subject">
                                <span th:text="${msg.subject}">Subject</span>
                                <span th:class="${msg.statusClass}" th:text="${msg.statusBadge}" style="font-size:0.7rem;margin-left:8px">New</span>
                            </div>
                            <div class="msg-preview" th:text="${msg.content}">Preview text...</div>
                        </div>
                        <div class="msg-meta text-end" style="min-width:80px">
                            <div th:text="${msg.senderUsername}">From</div>
                            <div th:text="${#temporals.format(msg.createdAt, 'MMM dd')}">Date</div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Sent Tab -->
        <div class="tab-pane fade" id="sent">
            <div th:if="${sentMessages.isEmpty()}" class="text-center py-4">
                <p style="color:var(--text-muted)">No sent messages</p>
            </div>
            <div th:each="msg : ${sentMessages}">
                <a th:href="@{/messages/{id}(id=${msg.id})}" class="message-item">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="msg-subject" th:text="${msg.subject}">Subject</div>
                            <div class="msg-preview" th:text="${msg.content}">Content</div>
                        </div>
                        <div class="msg-meta text-end" style="min-width:80px">
                            <div>To: <span th:text="${msg.receiverUsername}">User</span></div>
                            <div th:text="${#temporals.format(msg.createdAt, 'MMM dd')}">Date</div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
