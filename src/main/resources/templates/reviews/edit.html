<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Edit Review')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-slate-700 to-slate-900 px-8 py-8">
            <h1 class="text-3xl font-extrabold text-white">Edit Review</h1>
            <p class="text-gray-400 mt-1">Update your thoughts on this vehicle.</p>
        </div>

        <form th:action="@{/reviews/{id}/edit(id=${review.id})}" method="POST" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3">Rating (1–5)</label>
                <div class="flex gap-2 star-rating">
                    <input type="hidden" name="rating" id="ratingValue" th:value="${review.rating}" required>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="1">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="2">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="3">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="4">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="5">★</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Review</label>
                <textarea name="content" rows="5" required
                          th:text="${review.content}"
                          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg transition">Update Review</button>
                <a th:href="@{/vehicle/{id}(id=${review.vehicle.id})}" class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition">Back</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('ratingValue');
    let selectedRating = parseInt(ratingInput.value) || 5;

    function updateStars(value) {
        stars.forEach((s, idx) => { s.style.opacity = idx < value ? '1' : '0.3'; });
    }
    updateStars(selectedRating);
    stars.forEach(star => {
        star.addEventListener('click', () => { selectedRating = parseInt(star.dataset.value); ratingInput.value = selectedRating; updateStars(selectedRating); });
        star.addEventListener('mouseover', () => updateStars(parseInt(star.dataset.value)));
        star.addEventListener('mouseout', () => updateStars(selectedRating));
    });
</script>
</body>
</html>
