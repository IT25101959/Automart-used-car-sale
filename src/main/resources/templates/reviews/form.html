<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Write a Review')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-amber-500 to-orange-600 px-8 py-8">
            <h1 class="text-3xl font-extrabold text-white">Write a Review</h1>
            <p class="text-amber-100 mt-1" th:text="${vehicle.brand} + ' ' + ${vehicle.model} + ' (' + ${vehicle.year} + ')'"></p>
        </div>

        <form th:action="@{/reviews/new}" method="POST" class="p-8 space-y-6">
            <input type="hidden" name="vehicleId" th:value="${vehicle.id}">

            <!-- Star Rating -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3">Your Rating</label>
                <div class="flex gap-2 star-rating" id="starRating">
                    <input type="hidden" name="rating" id="ratingValue" value="5" required>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="1">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="2">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="3">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="4">★</button>
                    <button type="button" class="star text-4xl text-yellow-400 hover:scale-110 transition" data-value="5">★</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Your Review</label>
                <textarea name="content" rows="5" required placeholder="Share your honest experience with this vehicle..."
                          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-transparent resize-none"></textarea>
            </div>

            <div class="flex items-center gap-3 bg-amber-50 border border-amber-200 rounded-xl p-4">
                <input type="checkbox" name="verified" id="verified" class="w-4 h-4 text-amber-600">
                <label for="verified" class="text-sm text-amber-800 font-medium">I am a verified buyer of this vehicle</label>
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl shadow-lg transition">Submit Review</button>
                <a th:href="@{/vehicle/{id}(id=${vehicle.id})}" class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

<script>
    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('ratingValue');
    let selectedRating = 5;

    function updateStars(value) {
        stars.forEach((s, idx) => {
            s.style.opacity = idx < value ? '1' : '0.3';
        });
    }

    updateStars(5);

    stars.forEach(star => {
        star.addEventListener('click', () => {
            selectedRating = parseInt(star.dataset.value);
            ratingInput.value = selectedRating;
            updateStars(selectedRating);
        });
        star.addEventListener('mouseover', () => updateStars(parseInt(star.dataset.value)));
        star.addEventListener('mouseout', () => updateStars(selectedRating));
    });
</script>
</body>
</html>
