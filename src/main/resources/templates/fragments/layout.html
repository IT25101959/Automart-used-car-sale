<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Reusable navbar fragment -->
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <span class="brand-icon">🚗</span>AutoVault
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/vehicles}">🔍 Browse Cars</a></li>
                    <li class="nav-item" th:if="${user != null and (user.role == 'SELLER' or user.role == 'ADMIN')}">
                        <a class="nav-link" th:href="@{/vehicles/add}">➕ Add Listing</a>
                    </li>
                    <li class="nav-item" th:if="${user != null and (user.role == 'SELLER' or user.role == 'ADMIN')}">
                        <a class="nav-link" th:href="@{/vehicles/my-listings}">📋 My Listings</a>
                    </li>
                    <li class="nav-item" th:if="${user != null and user.role == 'ADMIN'}">
                        <a class="nav-link" th:href="@{/admin/dashboard}">⚙️ Admin</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" th:if="${user != null}">
                        <a class="nav-link position-relative" th:href="@{/messages}">
                            ✉️ Inbox
                            <span class="badge bg-danger rounded-pill" th:if="${unreadCount != null and unreadCount > 0}" th:text="${unreadCount}"></span>
                        </a>
                    </li>
                    <li class="nav-item" th:if="${user != null}">
                        <a class="nav-link" th:href="@{/transactions/history}">📜 History</a>
                    </li>
                    <li class="nav-item" th:if="${user != null}">
                        <a class="nav-link" th:href="@{/profile}">
                            👤 <span th:text="${user.username}">User</span>
                        </a>
                    </li>
                    <li class="nav-item" th:if="${user != null}">
                        <a class="nav-link" th:href="@{/logout}">🚪 Logout</a>
                    </li>
                    <li class="nav-item" th:if="${user == null}">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item" th:if="${user == null}">
                        <a class="btn btn-primary btn-sm ms-2" th:href="@{/register}">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<!-- Reusable footer fragment -->
<div th:fragment="footer">
    <footer class="footer">
        <div class="container">
            <p class="mb-0">© 2026 AutoVault — Second-Hand Car Sales System. Built with Spring Boot &amp; Bootstrap 5.</p>
        </div>
    </footer>
</div>

<!-- Reusable head fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | AutoVault'">AutoVault</title>
    <meta name="description" content="AutoVault - Premium Second-Hand Car Sales Platform"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>

<!-- Reusable scripts fragment -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</div>

<!-- Alert fragment -->
<div th:fragment="alerts">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>
</html>
