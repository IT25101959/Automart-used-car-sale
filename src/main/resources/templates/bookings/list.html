<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('My Bookings')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-slate-900">My Bookings</h1>
            <p class="text-gray-500 mt-1">View and manage your test-drive reservations.</p>
        </div>
        <a href="/bookings/new" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow transition">+ New Booking</a>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="mb-6 bg-green-50 border border-green-300 text-green-800 px-4 py-3 rounded-xl" th:text="${success}"></div>
    <div th:if="${error}" class="mb-6 bg-red-50 border border-red-300 text-red-800 px-4 py-3 rounded-xl" th:text="${error}"></div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(bookings)}" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-16 text-center">
        <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <h3 class="text-lg font-semibold text-gray-600">No bookings yet</h3>
        <p class="text-gray-400 mt-1">Browse the inventory and book a test drive!</p>
        <a href="/vehicles" class="mt-4 inline-block text-blue-600 font-medium hover:underline">Browse Cars →</a>
    </div>

    <!-- Bookings table -->
    <div th:unless="${#lists.isEmpty(bookings)}" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-900 text-white text-xs uppercase tracking-widest">
                <tr>
                    <th class="px-6 py-4">Vehicle</th>
                    <th class="px-6 py-4">Date & Time</th>
                    <th class="px-6 py-4">Status</th>
                    <th class="px-6 py-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-sm">
                <tr th:each="b : ${bookings}" class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-medium text-slate-800" th:text="${b.vehicle.brand} + ' ' + ${b.vehicle.model} + ' (' + ${b.vehicle.year} + ')'"></td>
                    <td class="px-6 py-4 text-gray-600" th:text="${#temporals.format(b.bookingDate, 'dd MMM yyyy, hh:mm a')}"></td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold"
                              th:classappend="${b.status == 'CONFIRMED' ? 'bg-green-100 text-green-700' : (b.status == 'CANCELLED' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700')}"
                              th:text="${b.status}"></span>
                    </td>
                    <td class="px-6 py-4 text-right space-x-3">
                        <a th:href="@{/bookings/{id}/edit(id=${b.id})}" class="text-blue-600 hover:text-blue-900 font-medium">Edit</a>
                        <a th:href="@{/bookings/{id}/cancel(id=${b.id})}" class="text-red-500 hover:text-red-800 font-medium" onclick="return confirm('Cancel this booking?')">Cancel</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
