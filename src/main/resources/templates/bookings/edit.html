<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Edit Booking')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-slate-900 to-indigo-900 px-8 py-8">
            <h1 class="text-3xl font-extrabold text-white">Edit Booking</h1>
            <p class="text-indigo-200 mt-1">Update your reservation date and time.</p>
        </div>

        <form th:action="@{/bookings/{id}/edit(id=${booking.id})}" method="POST" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Vehicle</label>
                <div class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-800 font-medium"
                     th:text="${booking.vehicle.brand} + ' ' + ${booking.vehicle.model} + ' (' + ${booking.vehicle.year} + ')'"></div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">New Date & Time</label>
                <input type="datetime-local" name="bookingDate" required
                       th:value="${#temporals.format(booking.bookingDate, 'yyyy-MM-dd''T''HH:mm')}"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition">Update Booking</button>
                <a href="/bookings" class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition">Back</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
