<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Book a Test Drive')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-slate-900 to-blue-900 px-8 py-8">
            <h1 class="text-3xl font-extrabold text-white">Book a Test Drive</h1>
            <p class="text-blue-200 mt-1">Select your vehicle and choose a convenient time.</p>
        </div>

        <form action="/bookings/new" method="POST" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select Vehicle</label>
                <select name="vehicleId" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="" disabled selected>-- Choose a vehicle --</option>
                    <option th:each="v : ${vehicles}"
                            th:value="${v.id}"
                            th:text="${v.brand} + ' ' + ${v.model} + ' (' + ${v.year} + ')'"
                            th:selected="${selectedVehicleId != null && selectedVehicleId == v.id}">
                    </option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Preferred Date & Time</label>
                <input type="datetime-local" name="bookingDate" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-sm text-blue-700">
                <strong>Note:</strong> Test drive bookings are subject to availability and admin confirmation. You'll receive a status update on your bookings page.
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition">Confirm Booking</button>
                <a href="/bookings" class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
