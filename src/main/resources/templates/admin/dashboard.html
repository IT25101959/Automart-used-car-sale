<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>⚙️ Admin Dashboard</h1></div>

    <!-- Stats -->
    <div class="row g-4 mb-5">
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" th:text="${totalUsers}">0</div>
                <div class="stat-title">Total Users</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon">🚗</div>
                <div class="stat-value" th:text="${totalVehicles}">0</div>
                <div class="stat-title">Total Vehicles</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card" style="border-color:rgba(253,203,110,0.3)">
                <div class="stat-icon">⏳</div>
                <div class="stat-value" style="color:var(--warning)" th:text="${pendingListings}">0</div>
                <div class="stat-title">Pending Listings</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="stat-card">
                <div class="stat-icon">💳</div>
                <div class="stat-value" th:text="${totalTransactions}">0</div>
                <div class="stat-title">Transactions</div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="d-flex gap-3 mb-4 flex-wrap">
        <a th:href="@{/admin/users}" class="btn btn-outline-primary">👥 Manage Users</a>
        <a th:href="@{/admin/listings}" class="btn btn-outline-primary">📋 Manage Listings</a>
        <a th:href="@{/admin/listings(status=PENDING)}" class="btn btn-primary">⏳ Review Pending (<span th:text="${pendingListings}">0</span>)</a>
    </div>

    <!-- Pending Listings -->
    <div th:if="${!recentVehicles.isEmpty()}" class="card p-4">
        <h5 class="mb-3" style="color:var(--text-primary)">Pending Listings for Review</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead><tr><th>Vehicle</th><th>Seller</th><th>Price</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="v : ${recentVehicles}">
                        <td><strong th:text="${v.title}">Car</strong> <span class="badge" th:classappend="${v.fuelType == 'Electric'} ? 'electric' : 'petrol'" style="font-size:0.7rem" th:text="${v.fuelType}">Type</span></td>
                        <td th:text="${v.sellerUsername}">Seller</td>
                        <td th:text="${v.formattedPrice}">$25,000</td>
                        <td th:text="${#temporals.format(v.createdAt, 'MMM dd')}">Date</td>
                        <td>
                            <form th:action="@{/admin/listings/{id}/approve(id=${v.id})}" method="post" style="display:inline">
                                <button class="btn btn-success btn-sm">✅ Approve</button>
                            </form>
                            <form th:action="@{/admin/listings/{id}/reject(id=${v.id})}" method="post" style="display:inline">
                                <button class="btn btn-danger btn-sm">❌ Reject</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
