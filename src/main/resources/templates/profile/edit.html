<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Profile')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:700px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>Edit Profile</h1></div>

    <div class="card p-4 mb-4">
        <h5 class="mb-3" style="color:var(--text-primary)">Update Details</h5>
        <form th:action="@{/profile/edit}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="fullName" class="form-control" th:value="${user.fullName}" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" th:value="${user.email}" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" th:value="${user.phone}" />
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/profile}" class="btn btn-outline-light ms-2">Cancel</a>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-4 mb-4">
        <h5 class="mb-3" style="color:var(--text-primary)">Change Password</h5>
        <form th:action="@{/profile/password}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="oldPassword" class="form-control" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">New Password</label>
                    <input type="password" name="newPassword" class="form-control" required />
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-4" style="border-color:rgba(225,112,85,0.3)">
        <h5 class="mb-3" style="color:var(--danger)">Danger Zone</h5>
        <p style="color:var(--text-secondary);font-size:0.9rem">Deactivating your account will prevent you from logging in. This action can be reversed by an admin.</p>
        <form th:action="@{/profile/deactivate}" method="post">
            <button type="submit" class="btn btn-danger" data-confirm="Are you sure you want to deactivate your account?">
                Deactivate Account
            </button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
