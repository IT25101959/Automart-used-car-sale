<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header">
        <h1 th:if="${profileUser != null}" th:text="${profileUser.fullName} + '''s Profile'">Profile</h1>
        <h1 th:if="${profileUser == null}">My Profile</h1>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card text-center p-4">
                <div style="font-size:4rem;margin-bottom:1rem">👤</div>
                <h4 th:text="${profileUser != null ? profileUser.fullName : user.fullName}" style="color:var(--text-primary)">Name</h4>
                <p>
                    <span class="badge bg-primary" th:text="${profileUser != null ? profileUser.displayRole : user.displayRole}">Role</span>
                    <span class="badge" th:classappend="${(profileUser != null ? profileUser.active : user.active) ? 'bg-approved' : 'bg-rejected'}"
                          th:text="${(profileUser != null ? profileUser.active : user.active) ? 'Active' : 'Inactive'}">Status</span>
                </p>
                <div th:if="${profileUser == null}" class="mt-3">
                    <a th:href="@{/profile/edit}" class="btn btn-outline-primary btn-sm">Edit Profile</a>
                </div>
            </div>

            <!-- Average Rating for Sellers -->
            <div th:if="${avgRating != null}" class="card p-4 mt-3 text-center">
                <h5 style="color:var(--text-secondary)">Seller Rating</h5>
                <div class="stars large" th:text="${T(String).format('%.0f', avgRating) == '5' ? '★★★★★' : T(String).format('%.0f', avgRating) == '4' ? '★★★★☆' : T(String).format('%.0f', avgRating) == '3' ? '★★★☆☆' : '★★☆☆☆'}"></div>
                <p style="color:var(--text-muted)" th:text="${avgRating} + '/5 (' + ${reviewCount} + ' reviews)'">Rating</p>
                <a th:if="${user != null and profileUser != null and user.id != profileUser.id}" th:href="@{/reviews/add/{id}(id=${profileUser.id})}" class="btn btn-outline-primary btn-sm">Write a Review</a>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3" style="color:var(--text-primary)">Profile Details</h5>
                <table class="table">
                    <tr><td style="color:var(--text-muted)">Username</td><td th:text="${profileUser != null ? profileUser.username : user.username}">—</td></tr>
                    <tr><td style="color:var(--text-muted)">Email</td><td th:text="${profileUser != null ? profileUser.email : user.email}">—</td></tr>
                    <tr><td style="color:var(--text-muted)">Phone</td><td th:text="${(profileUser != null ? profileUser.phone : user.phone) ?: 'Not set'}">—</td></tr>
                    <tr><td style="color:var(--text-muted)">Member Since</td><td th:text="${#temporals.format(profileUser != null ? profileUser.createdAt : user.createdAt, 'MMM dd, yyyy')}">—</td></tr>
                </table>
            </div>

            <!-- Reviews Section -->
            <div th:if="${reviews != null and !reviews.isEmpty()}" class="card p-4 mt-3">
                <h5 class="mb-3" style="color:var(--text-primary)">Reviews</h5>
                <div th:each="review : ${reviews}" class="mb-3 pb-3" style="border-bottom:1px solid var(--glass-border)">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <strong th:text="${review.reviewerUsername}" style="color:var(--primary-light)">Reviewer</strong>
                        <span class="stars" th:text="${review.starDisplay}">★★★★★</span>
                    </div>
                    <p class="mb-1" style="color:var(--text-secondary);font-size:0.9rem" th:text="${review.comment}">Comment</p>
                    <small style="color:var(--text-muted)" th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</small>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
