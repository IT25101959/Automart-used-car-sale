<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Vehicle')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-800 to-indigo-900 px-8 py-8">
            <h1 class="text-3xl font-extrabold text-white">Add Vehicle to Inventory</h1>
            <p class="text-blue-200 mt-1">Fill in all details to create a new listing.</p>
        </div>

        <form action="/admin/vehicles/new" method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
            <!-- Vehicle Type -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Vehicle Type</label>
                <select name="type" id="vehicleType" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="CAR">Car</option>
                    <option value="SUV">SUV</option>
                    <option value="TRUCK">Truck</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Brand</label>
                    <input type="text" name="brand" required placeholder="e.g., Toyota"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Model</label>
                    <input type="text" name="model" required placeholder="e.g., Prius"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Year</label>
                    <input type="number" name="year" required min="1990" max="2026"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Price (LKR)</label>
                    <input type="number" name="price" required min="0" step="0.01"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Mileage (km)</label>
                    <input type="number" name="mileage" required min="0"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Fuel Type</label>
                    <select name="fuelType" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option>Petrol</option>
                        <option>Diesel</option>
                        <option>Hybrid</option>
                        <option>Electric</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Transmission</label>
                    <select name="transmission" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option>Automatic</option>
                        <option>Manual</option>
                        <option>CVT</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Number of Doors (Car)</label>
                    <input type="number" name="numberOfDoors" value="4" min="2" max="5"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
            </div>

            <div id="suvField" class="hidden">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" name="isFourWheelDrive" class="w-4 h-4 text-blue-600">
                    <span class="text-sm font-semibold text-gray-700">4-Wheel Drive (SUV)</span>
                </label>
            </div>
            <div id="truckField" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Payload Capacity (kg)</label>
                <input type="number" name="payloadCapacity" placeholder="e.g., 1000"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- Image File Upload -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Vehicle Image</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-blue-500 transition cursor-pointer relative" id="drop-zone">
                    <div class="space-y-1 text-center" id="upload-prompt">
                        <svg class="mx-auto h-12 w-12 text-gray-400 animate-pulse" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600 justify-center">
                            <span class="relative font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                Upload a file
                            </span>
                            <p class="pl-1">or drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, JPEG, WEBP up to 5MB</p>
                    </div>
                    <!-- Hidden file input -->
                    <input id="imageFile" name="imageFile" type="file" class="sr-only" accept=".jpg,.jpeg,.png,.webp" required>
                    <!-- Preview Container -->
                    <div id="preview-container" class="hidden absolute inset-0 bg-white rounded-xl flex items-center justify-between p-4 border border-gray-200">
                        <div class="flex items-center space-x-4">
                            <img id="image-preview" src="#" alt="Preview" class="h-16 w-24 object-cover rounded-lg border">
                            <div class="text-left">
                                <p id="file-name" class="text-sm font-semibold text-gray-800 truncate max-w-[200px]"></p>
                                <p id="file-size" class="text-xs text-gray-500"></p>
                            </div>
                        </div>
                        <button type="button" id="remove-btn" class="bg-red-50 hover:bg-red-100 text-red-600 rounded-lg px-3 py-2 text-xs font-semibold transition">
                            Remove
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit" class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-xl shadow-lg transition">Add Vehicle</button>
                <a href="/admin" class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<script>
    const typeSelect = document.getElementById('vehicleType');
    typeSelect.addEventListener('change', function() {
        document.getElementById('suvField').classList.toggle('hidden', this.value !== 'SUV');
        document.getElementById('truckField').classList.toggle('hidden', this.value !== 'TRUCK');
    });

    // File Upload Drag and Drop with Preview
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('imageFile');
    const uploadPrompt = document.getElementById('upload-prompt');
    const previewContainer = document.getElementById('preview-container');
    const imagePreview = document.getElementById('image-preview');
    const fileNameText = document.getElementById('file-name');
    const fileSizeText = document.getElementById('file-size');
    const removeBtn = document.getElementById('remove-btn');

    dropZone.addEventListener('click', (e) => {
        if (e.target !== removeBtn && !removeBtn.contains(e.target)) {
            fileInput.click();
        }
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50/30');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50/30');
        }, false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length) {
            fileInput.files = files;
            updatePreview(files[0]);
        }
    });

    fileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            updatePreview(this.files[0]);
        }
    });

    function updatePreview(file) {
        if (!file) return;
        fileNameText.textContent = file.name;
        fileSizeText.textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
        
        const reader = new FileReader();
        reader.onload = function(e) {
            imagePreview.src = e.target.result;
            uploadPrompt.classList.add('hidden');
            previewContainer.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.value = '';
        imagePreview.src = '#';
        previewContainer.classList.add('hidden');
        uploadPrompt.classList.remove('hidden');
    });
</script>
</body>
</html>
