<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Inventory')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments :: navbar}"></nav>

<div class="bg-slate-900 text-white py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight mb-4">Our Premium Inventory</h1>
        <p class="text-gray-400 text-lg">Browse through our extensive collection of high-quality vehicles.</p>
        <div class="mt-8 max-w-2xl mx-auto">
            <form action="/vehicles" method="get" class="flex items-center bg-white rounded-full p-1">
                <input type="text" name="search" th:value="${param.search}" placeholder="Search cars, SUVs, trucks..." class="flex-grow px-6 py-3 rounded-l-full focus:outline-none text-gray-800">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full font-medium transition">Search</button>
            </form>
        </div>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <!-- Grid -->
    <div th:if="${not #lists.isEmpty(vehicles)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div th:each="vehicle : ${vehicles}" class="bg-white rounded-xl shadow-sm hover:shadow-xl transition transform hover:-translate-y-1 overflow-hidden border border-gray-100 flex flex-col">
            <div class="relative h-48 bg-gray-200">
                <img th:if="${vehicle.imageUrl != null && vehicle.imageUrl != ''}" th:src="${vehicle.imageUrl}" class="w-full h-full object-cover">
                <img th:unless="${vehicle.imageUrl != null && vehicle.imageUrl != ''}" src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
                <div class="absolute top-3 right-3 bg-slate-900/80 backdrop-blur-sm text-white px-2 py-1 rounded text-xs font-bold">
                    LKR <span th:text="${#numbers.formatDecimal(vehicle.price, 0, 'COMMA', 0, 'POINT')}"></span>
                </div>
            </div>
            <div class="p-4 flex-grow flex flex-col">
                <p class="text-xs font-semibold text-blue-500 uppercase mb-1" th:text="${vehicle.brand}"></p>
                <h3 class="text-lg font-bold text-slate-800 mb-3" th:text="${vehicle.model} + ' (' + ${vehicle.year} + ')'"></h3>
                
                <div class="grid grid-cols-2 gap-2 text-xs text-gray-500 mb-4">
                    <span th:text="${vehicle.mileage} + ' km'"></span>
                    <span th:text="${vehicle.fuelType}"></span>
                    <span th:text="${vehicle.transmission}"></span>
                    <span th:text="${vehicle.category}"></span>
                </div>
                
                <a th:href="@{/vehicle/{id}(id=${vehicle.id})}" class="mt-auto w-full text-center border border-slate-900 text-slate-900 hover:bg-slate-900 hover:text-white font-medium py-2 rounded-lg transition duration-300">View Details</a>
            </div>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(vehicles)}" class="text-center py-20">
        <p class="text-gray-500 text-xl">No vehicles found matching your criteria.</p>
        <a href="/vehicles" class="text-blue-600 mt-4 inline-block font-medium">Clear Search</a>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>

</body>
</html>
