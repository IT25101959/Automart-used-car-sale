<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<div class="auth-container">
    <div class="auth-card fade-in-up" style="max-width:500px">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join AutoVault to buy or sell cars</p>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <form th:action="@{/register}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose username" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="fullName" class="form-control" placeholder="Your full name" required />
                </div>
                <div class="col-12">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" placeholder="Phone number" />
                </div>
                <div class="col-12">
                    <label class="form-label">Register as</label>
                    <select name="role" class="form-select" required>
                        <option value="BUYER">Buyer — I want to buy cars</option>
                        <option value="SELLER">Seller — I want to sell cars</option>
                    </select>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary w-100">Create Account</button>
                </div>
            </div>
        </form>
        <p class="text-center mt-3" style="color:var(--text-muted);font-size:0.9rem">
            Already have an account? <a th:href="@{/login}" style="color:var(--primary-light)">Sign in</a>
        </p>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
