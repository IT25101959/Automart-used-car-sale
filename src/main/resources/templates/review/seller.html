<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Seller Reviews')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:800px">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <!-- Seller Header -->
    <div class="card p-4 mb-4 text-center">
        <div style="font-size:3rem">👤</div>
        <h3 style="color:var(--text-primary)" th:text="${seller.fullName}">Seller Name</h3>
        <p style="color:var(--text-muted)" th:text="'@' + ${seller.username}">@username</p>
        <div class="stars large" th:text="${avgRating >= 4.5 ? '★★★★★' : avgRating >= 3.5 ? '★★★★☆' : avgRating >= 2.5 ? '★★★☆☆' : avgRating >= 1.5 ? '★★☆☆☆' : '★☆☆☆☆'}">★★★★★</div>
        <p style="color:var(--text-secondary)" th:text="${avgRating} + '/5 from ' + ${reviewCount} + ' reviews'">Rating</p>
        <div th:if="${user != null and !user.id.equals(seller.id)}">
            <a th:href="@{/reviews/add/{id}(id=${seller.id})}" class="btn btn-primary">✏️ Write a Review</a>
        </div>
    </div>

    <!-- Reviews List -->
    <div th:if="${reviews.isEmpty()}" class="text-center py-4">
        <p style="color:var(--text-muted)">No reviews yet for this seller.</p>
    </div>

    <div th:each="review : ${reviews}" class="card p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
                <strong style="color:var(--primary-light)" th:text="${review.reviewerUsername}">Reviewer</strong>
                <span class="stars ms-2" th:text="${review.starDisplay}">★★★★★</span>
                <span class="badge bg-primary ms-1" style="font-size:0.7rem" th:text="${review.ratingText}">Excellent</span>
            </div>
            <small style="color:var(--text-muted)" th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</small>
        </div>
        <p style="color:var(--text-secondary);margin:0" th:text="${review.comment}">Review comment</p>

        <!-- Edit/Delete own reviews -->
        <div th:if="${user != null and user.id.equals(review.reviewerId)}" class="mt-2 d-flex gap-2">
            <a th:href="@{/reviews/{id}/edit(id=${review.id})}" class="btn btn-outline-primary btn-sm">Edit</a>
            <form th:action="@{/reviews/{id}/delete(id=${review.id})}" method="post" style="display:inline">
                <button class="btn btn-danger btn-sm" data-confirm="Delete this review?">Delete</button>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
