<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add Spare Part')}"></head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<nav th:replace="~{fragments :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-emerald-700 to-teal-800 px-8 py-8">
            <h1 class="text-3xl font-extrabold text-white">Add Spare Part</h1>
            <p class="text-emerald-200 mt-1">Add a new part to the AutoMart inventory.</p>
        </div>

        <form action="/spare-parts/new" method="POST" enctype="multipart/form-data" class="p-8 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Part Type</label>
                <select name="type" id="partType" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                    <option value="ENGINE">Engine Part</option>
                    <option value="BODY">Body Part</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Part Name</label>
                    <input type="text" name="name" required placeholder="e.g., Spark Plugs"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Brand</label>
                    <input type="text" name="brand" required placeholder="e.g., NGK, Bosch"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Price (LKR)</label>
                <input type="number" name="price" required min="0" step="0.01"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                <textarea name="description" rows="3" required
                          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-none"></textarea>
            </div>

            <!-- Image File Upload -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Part Image</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-emerald-500 transition cursor-pointer relative" id="drop-zone">
                    <div class="space-y-1 text-center" id="upload-prompt">
                        <svg class="mx-auto h-12 w-12 text-gray-400 animate-pulse" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600 justify-center">
                            <span class="relative font-medium text-emerald-600 hover:text-emerald-500 focus-within:outline-none">
                                Upload a file
                            </span>
                            <p class="pl-1">or drag and drop</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, JPEG, WEBP up to 5MB</p>
                    </div>
                    <!-- Hidden file input -->
                    <input id="imageFile" name="imageFile" type="file" class="sr-only" accept=".jpg,.jpeg,.png,.webp" required>
                    <!-- Preview Container -->
                    <div id="preview-container" class="hidden absolute inset-0 bg-white rounded-xl flex items-center justify-between p-4 border border-gray-200">
                        <div class="flex items-center space-x-4">
                            <img id="image-preview" src="#" alt="Preview" class="h-16 w-24 object-cover rounded-lg border">
                            <div class="text-left">
                                <p id="file-name" class="text-sm font-semibold text-gray-800 truncate max-w-[200px]"></p>
                                <p id="file-size" class="text-xs text-gray-500"></p>
                            </div>
                        </div>
                        <button type="button" id="remove-btn" class="bg-red-50 hover:bg-red-100 text-red-600 rounded-lg px-3 py-2 text-xs font-semibold transition">
                            Remove
                        </button>
                    </div>
                </div>
            </div>

            <div id="engineFields">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Compatibility (Engine Part)</label>
                <input type="text" name="compatibility" placeholder="e.g., Toyota Corolla 2015–2020"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>

            <div id="bodyFields" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Color (Body Part)</label>
                <input type="text" name="color" placeholder="e.g., Pearl White"
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg transition">Add Part</button>
                <a href="/spare-parts" class="flex-1 text-center border border-gray-200 text-gray-600 hover:bg-gray-50 font-medium py-3 rounded-xl transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<script>
    document.getElementById('partType').addEventListener('change', function() {
        document.getElementById('engineFields').classList.toggle('hidden', this.value !== 'ENGINE');
        document.getElementById('bodyFields').classList.toggle('hidden', this.value !== 'BODY');
    });

    // File Upload Drag and Drop with Preview
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('imageFile');
    const uploadPrompt = document.getElementById('upload-prompt');
    const previewContainer = document.getElementById('preview-container');
    const imagePreview = document.getElementById('image-preview');
    const fileNameText = document.getElementById('file-name');
    const fileSizeText = document.getElementById('file-size');
    const removeBtn = document.getElementById('remove-btn');

    dropZone.addEventListener('click', (e) => {
        if (e.target !== removeBtn && !removeBtn.contains(e.target)) {
            fileInput.click();
        }
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.add('border-emerald-500', 'bg-emerald-50/30');
        }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-emerald-500', 'bg-emerald-50/30');
        }, false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length) {
            fileInput.files = files;
            updatePreview(files[0]);
        }
    });

    fileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            updatePreview(this.files[0]);
        }
    });

    function updatePreview(file) {
        if (!file) return;
        fileNameText.textContent = file.name;
        fileSizeText.textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
        
        const reader = new FileReader();
        reader.onload = function(e) {
            imagePreview.src = e.target.result;
            uploadPrompt.classList.add('hidden');
            previewContainer.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.value = '';
        imagePreview.src = '#';
        previewContainer.classList.add('hidden');
        uploadPrompt.classList.remove('hidden');
    });
</script>
</body>
</html>
