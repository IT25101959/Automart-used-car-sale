<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add Listing')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:800px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>Add Vehicle Listing</h1></div>

    <div class="card p-4">
        <form th:action="@{/vehicles/add}" method="post">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Make</label>
                    <input type="text" name="make" class="form-control" placeholder="e.g., Toyota" required />
                </div>
                <div class="col-md-4">
                    <label class="form-label">Model</label>
                    <input type="text" name="model_name" class="form-control" placeholder="e.g., Camry" required />
                </div>
                <div class="col-md-4">
                    <label class="form-label">Year</label>
                    <input type="number" name="year" class="form-control" placeholder="2021" min="1990" max="2026" required />
                </div>
                <div class="col-md-4">
                    <label class="form-label">Price ($)</label>
                    <input type="number" name="price" class="form-control" placeholder="25000" step="0.01" required />
                </div>
                <div class="col-md-4">
                    <label class="form-label">Mileage (km)</label>
                    <input type="number" name="mileage" class="form-control" placeholder="35000" required />
                </div>
                <div class="col-md-4">
                    <label class="form-label">Color</label>
                    <input type="text" name="color" class="form-control" placeholder="White" />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Transmission</label>
                    <select name="transmission" class="form-select">
                        <option value="Automatic">Automatic</option>
                        <option value="Manual">Manual</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fuel Type</label>
                    <select name="fuelType" id="fuelType" class="form-select">
                        <option value="PETROL">Petrol</option>
                        <option value="ELECTRIC">Electric</option>
                    </select>
                </div>

                <!-- Petrol-specific fields -->
                <div id="petrolFields">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Engine Capacity (L)</label>
                            <input type="number" name="engineCapacity" class="form-control" step="0.1" placeholder="2.0" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fuel Efficiency (km/L)</label>
                            <input type="number" name="fuelEfficiency" class="form-control" step="0.1" placeholder="14.0" />
                        </div>
                    </div>
                </div>

                <!-- Electric-specific fields -->
                <div id="electricFields" style="display:none">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Battery (kWh)</label>
                            <input type="number" name="batteryCapacity" class="form-control" step="0.1" placeholder="75" />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Range (km)</label>
                            <input type="number" name="drivingRange" class="form-control" placeholder="400" />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Charge Time (hrs)</label>
                            <input type="number" name="chargeTime" class="form-control" step="0.1" placeholder="8" />
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Describe your vehicle..."></textarea>
                </div>
                <div class="col-12">
                    <label class="form-label">Image URL (optional)</label>
                    <input type="text" name="imageUrl" class="form-control" placeholder="https://example.com/car.jpg" />
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-success btn-lg">Submit Listing</button>
                    <p class="mt-2" style="color:var(--text-muted);font-size:0.85rem">Your listing will be reviewed by an admin before it goes live.</p>
                </div>
            </div>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
