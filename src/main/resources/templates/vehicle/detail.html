<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Vehicle Details')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <a th:href="@{/vehicles}" class="btn btn-outline-primary btn-sm mb-3">← Back to Listings</a>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card overflow-hidden">
                <img th:src="${vehicle.imageUrl}" th:alt="${vehicle.title}" style="width:100%;height:400px;object-fit:cover"
                     onerror="this.src='https://via.placeholder.com/700x400/1a1a3e/6c5ce7?text=No+Image'" />
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <span class="fuel-badge" th:classappend="${vehicle.fuelType == 'Electric'} ? 'electric' : 'petrol'" th:text="${vehicle.fuelType}">Petrol</span>
                    <span class="badge" th:classappend="'bg-' + ${vehicle.status.toLowerCase()}" th:text="${vehicle.status}">APPROVED</span>
                </div>
                <h2 style="color:var(--text-primary);font-weight:800" th:text="${vehicle.title}">2021 Toyota Camry</h2>
                <h3 class="text-gradient mb-3" th:text="${vehicle.formattedPrice}">$25,000</h3>

                <div class="vehicle-info mb-3">
                    <span>📅 <span th:text="${vehicle.year}">2021</span></span>
                    <span>📏 <span th:text="${#numbers.formatInteger(vehicle.mileage, 1, 'COMMA')}">35,000</span> km</span>
                    <span>⚙️ <span th:text="${vehicle.transmission}">Auto</span></span>
                    <span>🎨 <span th:text="${vehicle.color}">White</span></span>
                </div>

                <p th:if="${vehicle.specificDetails}" style="color:var(--text-secondary);font-size:0.9rem" th:text="${vehicle.specificDetails}">Specs</p>

                <div class="divider"></div>

                <p style="color:var(--text-secondary);font-size:0.9rem" th:text="${vehicle.description}">Description</p>

                <div class="divider"></div>

                <div class="d-flex align-items-center gap-2 mb-3">
                    <span style="font-size:1.5rem">👤</span>
                    <div>
                        <a th:href="@{/profile/user/{id}(id=${vehicle.sellerId})}" style="color:var(--primary-light);font-weight:600" th:text="${vehicle.sellerUsername}">Seller</a>
                        <div th:if="${sellerAvgRating != null}" style="font-size:0.85rem">
                            <span class="stars" style="font-size:0.9rem">★</span>
                            <span style="color:var(--text-muted)" th:text="${sellerAvgRating} + '/5'">4.5/5</span>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div th:if="${user != null and vehicle.status == 'APPROVED' and !vehicle.sellerId.equals(user.id)}" class="d-grid gap-2">
                    <a th:href="@{/transactions/checkout/{id}(id=${vehicle.id})}" class="btn btn-success btn-lg">🛒 Buy Now</a>
                    <a th:href="@{/messages/compose(to=${vehicle.sellerId},vehicleId=${vehicle.id})}" class="btn btn-outline-primary">✉️ Contact Seller</a>
                </div>
                <div th:if="${user == null}" class="d-grid gap-2">
                    <a th:href="@{/login}" class="btn btn-primary btn-lg">Login to Buy</a>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
