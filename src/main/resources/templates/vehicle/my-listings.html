<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Listings')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header d-flex justify-content-between align-items-center">
        <h1>My Listings</h1>
        <a th:href="@{/vehicles/add}" class="btn btn-primary">➕ Add New</a>
    </div>

    <div th:if="${vehicles.isEmpty()}" class="text-center py-5">
        <div style="font-size:3rem">📋</div>
        <h4 style="color:var(--text-secondary)">No listings yet</h4>
        <a th:href="@{/vehicles/add}" class="btn btn-primary mt-2">Add Your First Listing</a>
    </div>

    <div class="table-responsive" th:if="${!vehicles.isEmpty()}">
        <table class="table table-hover">
            <thead><tr><th>Vehicle</th><th>Price</th><th>Mileage</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="v : ${vehicles}">
                    <td><strong th:text="${v.title}">Car</strong><br/><small style="color:var(--text-muted)" th:text="${v.fuelType}">Petrol</small></td>
                    <td th:text="${v.formattedPrice}">$25,000</td>
                    <td th:text="${#numbers.formatInteger(v.mileage, 1, 'COMMA')} + ' km'">35,000 km</td>
                    <td><span class="badge" th:classappend="'bg-' + ${v.status.toLowerCase()}" th:text="${v.status}">Status</span></td>
                    <td th:text="${#temporals.format(v.createdAt, 'MMM dd, yyyy')}">Date</td>
                    <td>
                        <a th:href="@{/vehicles/{id}(id=${v.id})}" class="btn btn-outline-primary btn-sm">View</a>
                        <a th:href="@{/vehicles/{id}/edit(id=${v.id})}" class="btn btn-outline-light btn-sm">Edit</a>
                        <form th:action="@{/vehicles/{id}/delete(id=${v.id})}" method="post" style="display:inline">
                            <button class="btn btn-danger btn-sm" data-confirm="Delete this listing?">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
