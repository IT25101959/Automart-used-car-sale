<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Listing')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container" style="max-width:700px">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="page-header"><h1>Edit Listing</h1></div>
    <div class="card p-4">
        <h5 class="mb-3" style="color:var(--primary-light)" th:text="${vehicle.title}">Vehicle</h5>
        <form th:action="@{/vehicles/{id}/edit(id=${vehicle.id})}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Price ($)</label>
                    <input type="number" name="price" class="form-control" th:value="${vehicle.price}" step="0.01" required />
                </div>
                <div class="col-md-6">
                    <label class="form-label">Mileage (km)</label>
                    <input type="number" name="mileage" class="form-control" th:value="${vehicle.mileage}" required />
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4" th:text="${vehicle.description}"></textarea>
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/vehicles/my-listings}" class="btn btn-outline-light ms-2">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
