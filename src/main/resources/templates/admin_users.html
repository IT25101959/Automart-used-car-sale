<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('User Management')}"></head>
<body class="bg-slate-100 min-h-screen">

<nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
        <a href="/admin" class="text-2xl font-bold text-red-400">AutoMart Admin</a>
        <div class="flex items-center space-x-4 text-sm">
            <a href="/admin" class="hover:text-gray-300 transition">Dashboard</a>
            <a href="/admin/users" class="text-red-400 font-semibold">Users</a>
            <a href="/" class="hover:text-gray-300 transition">View Site</a>
            <a href="/logout" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded transition">Logout</a>
        </div>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-slate-800">All Registered Users</h1>
        <span class="text-sm text-gray-500" th:text="${#lists.size(users)} + ' total users'"></span>
    </div>

    <div th:if="${success}" class="mb-6 bg-green-50 border border-green-300 text-green-800 px-4 py-3 rounded-xl" th:text="${success}"></div>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-800 text-white text-xs uppercase tracking-wider">
                <tr>
                    <th class="px-6 py-4">ID</th>
                    <th class="px-6 py-4">Name</th>
                    <th class="px-6 py-4">Email</th>
                    <th class="px-6 py-4">Phone</th>
                    <th class="px-6 py-4">Role</th>
                    <th class="px-6 py-4 text-right">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-sm">
                <tr th:each="u : ${users}" class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 text-gray-400" th:text="${u.id}"></td>
                    <td class="px-6 py-4 font-semibold text-slate-800" th:text="${u.name}"></td>
                    <td class="px-6 py-4 text-gray-600" th:text="${u.email}"></td>
                    <td class="px-6 py-4 text-gray-600" th:text="${u.phone}"></td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-bold"
                              th:classappend="${u.role == 'ADMIN' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}"
                              th:text="${u.role}"></span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <a th:href="@{/admin/users/{id}/delete(id=${u.id})}"
                           class="text-red-500 hover:text-red-800 font-medium"
                           onclick="return confirm('Delete this user? This cannot be undone.')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
