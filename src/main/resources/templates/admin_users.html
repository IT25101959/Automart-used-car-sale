<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users | AutoMart Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link th:href="@{/css/dashboard.css}" rel="stylesheet" />
</head>
<body class="admin-body">

<!-- Admin Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark admin-navbar sticky-top">
    <div class="container px-4">
        <a class="navbar-brand admin-brand" href="/admin">
            <i class="bi bi-speedometer2 me-2"></i>AutoMart Admin
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar" aria-controls="adminNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNavbar">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item">
                    <a href="/admin" class="nav-link admin-nav-link"><i class="bi bi-grid-1x2-fill me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a href="/admin/users" class="nav-link admin-nav-link active"><i class="bi bi-people-fill me-1"></i>Users</a>
                </li>
                <li class="nav-item">
                    <a href="/" class="nav-link admin-nav-link"><i class="bi bi-globe me-1"></i>View Site</a>
                </li>
                <li class="nav-item ms-2">
                    <a href="/logout" class="btn btn-danger btn-sm px-3 rounded-pill"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container px-4 py-5">

    <!-- Flash message -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-5 animate-fade-in" role="alert">
        <div class="d-flex align-items-center">
            <i class="bi bi-check-circle-fill me-2 fs-5"></i>
            <span th:text="${success}"></span>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Section Header -->
    <div class="mb-5 animate-fade-in">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h1 class="admin-section-title fs-2 mb-1"><i class="bi bi-people-fill text-primary"></i>All Registered Users</h1>
                <span class="admin-section-subtitle">Comprehensive directory of administrators and customers</span>
            </div>
            <div class="glass-badge glass-badge-role-customer py-2 px-3 fs-6">
                <i class="bi bi-database me-2"></i><span th:text="${#lists.size(users)} + ' total accounts'">0 accounts</span>
            </div>
        </div>
    </div>

    <!-- User Cards Grid -->
    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4 col-xl-3 animate-fade-in" th:each="u, stat : ${users}" th:style="'animation-delay: ' + ${stat.index * 40} + 'ms;'">
            <div class="admin-card p-4 d-flex flex-column justify-content-between h-100">
                <div>
                    <!-- Card Top Header -->
                    <div class="d-flex align-items-start justify-content-between mb-4">
                        <div class="avatar-circle" style="background: linear-gradient(135deg, #3b82f6, #06b6d4);" 
                             th:text="${#strings.substring(u.name, 0, 1).toUpperCase()}">U</div>
                        <div class="d-flex flex-column align-items-end">
                            <span class="glass-badge" 
                                  th:classappend="${u.role == 'ADMIN' ? 'glass-badge-role-admin' : 'glass-badge-role-customer'}" 
                                  th:text="${u.role}">CUSTOMER</span>
                            <span class="text-muted small mt-1" style="font-size: 0.7rem;" th:text="'UID: #' + ${u.id}">UID: #1</span>
                        </div>
                    </div>

                    <!-- User Information -->
                    <h5 class="fs-5 mb-1" th:text="${u.name}">Full Name</h5>
                    
                    <div class="divider"></div>

                    <!-- User Contact details -->
                    <div class="mb-3">
                        <span class="text-muted d-block small mb-1"><i class="bi bi-envelope me-1"></i>Email Address</span>
                        <strong class="text-secondary small d-block" style="word-break: break-all;" th:text="${u.email}">email@domain.com</strong>
                    </div>

                    <div class="mb-3">
                        <span class="text-muted d-block small mb-1"><i class="bi bi-telephone me-1"></i>Phone Line</span>
                        <strong class="text-secondary small d-block" th:text="${u.phone != null ? u.phone : 'N/A'}">+94 77 123 4567</strong>
                    </div>

                    <div class="mb-4">
                        <span class="text-muted d-block small mb-1"><i class="bi bi-calendar-check me-1"></i>Registration Status</span>
                        <span class="text-secondary small">Active Member since 2026</span>
                    </div>
                </div>

                <!-- Action Footer -->
                <div>
                    <div class="divider"></div>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn admin-btn admin-btn-outline flex-grow-1" onclick="alert('User profile settings can be updated by the member securely on their own profile page.')">
                            <i class="bi bi-pencil-square me-1"></i>Edit Profile
                        </button>
                        <a th:href="@{/admin/users/{id}/delete(id=${u.id})}" class="btn admin-btn admin-btn-danger px-3" onclick="return confirm('Delete this user account permanently? This cannot be undone.')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
