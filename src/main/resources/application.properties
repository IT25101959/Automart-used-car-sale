spring.application.name=AutoMart

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/automart_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Keep the JPA session open during view rendering (prevents LazyInitializationException)
spring.jpa.open-in-view=true

# Thymeleaf settings
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static resources
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/

# ---- DEBUGGING: Show full error details in browser ----
server.error.whitelabel.enabled=true
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# Logs
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=DEBUG

# Multipart Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
