spring.application.name=AutoMart

# H2 file-based database (no MySQL needed)
spring.datasource.url=jdbc:h2:file:./data/automart_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.jpa.show-sql=false

# Keep the JPA session open during view rendering (prevents LazyInitializationException)
spring.jpa.open-in-view=true

# Thymeleaf settings
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static resources
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/

# ---- DEBUGGING: Show full error details in browser ----
server.error.whitelabel.enabled=true
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# Logs
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=DEBUG

# Multipart Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
